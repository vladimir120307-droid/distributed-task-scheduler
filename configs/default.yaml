scheduler:
  listen_addr: ":9090"
  heartbeat_interval: 2s
  election_timeout: 10s
  rebalance_interval: 30s
  max_tasks_in_flight: 10000
  drain_timeout: 30s

worker:
  concurrency: 4
  health_check_interval: 5s
  task_timeout: 300s
  register_retry_interval: 5s
  max_register_retries: 10
  shutdown_grace_period: 15s

storage:
  backend: "memory"
  # future: "redis", "postgres"
  gc_interval: 60s
  retention_period: 168h

hash_ring:
  virtual_nodes: 150
  replication_factor: 2

retry:
  max_retries: 3
  base_delay: 1s
  max_delay: 60s
  multiplier: 2.0
  jitter_fraction: 0.1

logging:
  level: "info"
  format: "json"
  output: "stdout"
